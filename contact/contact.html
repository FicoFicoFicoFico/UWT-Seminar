<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../style.css">
        <link rel="stylesheet" href="contact_style.css">
        <link rel="icon" href="../images/favicon.svg" type="image/svg">
        <title>WRC</title>
    </head>
    <body>
        <header class="header">
            <a href="../index.html" class="logo-link">
                <img src="../images/logo_negative.png" alt="WRC Logo" class="logo-image" style="box-shadow: none;">
            </a>
            <nav class="nav-menu">
                <a class="nav-button" href="../about/about.html">About</a>
                <a class="nav-button" href="../contact/contact.html">Contact</a>
            </nav>
        </header>
        <div class="hero-section">
            <div class="hero-image"></div>
            <h1 class="hero-title">Contact us</h1>
        </div>
        <div class="site-wrapper">
            <form>
                <label>
                    <b>Name:</b><br>
                    <input type="text" name="name" placeholder="Name">
                </label>
                <br>
                <label><b>Category:</b> </label><br>
                <label><input type="checkbox" name="category1" value="WRC">WRC</label>
                <label><input type="checkbox" name="category2" value="WRC2">WRC 2</label>
                <label><input type="checkbox" name="category3" value="WRC3">WRC 3</label>
                <br>
                <label><b>How often do you want to be contacted:</b> </label><br>
                <label><input type="radio" name="frequency" value="twiceaweek">Twice a week</label>
                <label><input type="radio" name="frequency" value="onceaweek">Once a week</label>
                <label><input type="radio" name="frequency" value="onceamonth">Once a month</label><br><br>
                <input class="button" type="submit" value="Submit">
                <input class="button" type="reset" value="Reset">
                <a class="button" href="mailto:furoicton@tvz.hr?subject=Hello">
                    Send an email
                </a>

            </form>
        </div>
        <footer class="footer">
            <p>Filip Uroić-Tončina, JMBAG: 0128064567</p>
        </footer>
    </body>
</html>
